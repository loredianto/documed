services:
  # Used only by Document Service for metadata and GridFS content.
  mongodb:
    image: mongo:6.0
    container_name: platform-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?MONGO_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongodb-data:/data/db
    networks:
      - platform-network
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet --host localhost
          --username "$${MONGO_INITDB_ROOT_USERNAME}"
          --password "$${MONGO_INITDB_ROOT_PASSWORD}"
          --authenticationDatabase admin
          --eval 'quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mongodb-data:

networks:
  platform-network:
    name: platform-network
    driver: bridge
