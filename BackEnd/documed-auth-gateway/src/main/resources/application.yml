spring:
  application:
    name: documed-auth-gateway
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    schemas: auth_service
    default-schema: auth_service
    # V2 is kept for Flyway compatibility with existing local databases, but
    # these placeholders are intentionally empty: the service must not create
    # local demo users or OAuth clients automatically.
    placeholders:
      demo_admin_username: ''
      demo_admin_password_hash: ''
      demo_oauth_client_id: ''
      demo_oauth_client_secret_hash: ''
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth_service
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: ${GATEWAY_MAX_FILE_SIZE:10MB}
      # The request limit includes multipart headers in addition to the file.
      max-request-size: ${GATEWAY_MAX_REQUEST_SIZE:11MB}

server:
  port: ${SERVER_PORT:8282}
  error:
    include-exception: false
    include-message: never
    include-stacktrace: never

security:
  jwt:
    signing-key: ${JWT_SIGNING_KEY}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

zuul:
  ignored-services: '*'
  sensitive-headers: Cookie,Set-Cookie
  ignored-headers: Access-Control-Allow-Credentials,Access-Control-Allow-Origin
  host:
    connect-timeout-millis: ${GATEWAY_CONNECT_TIMEOUT_MS:5000}
    # Must be longer than Document Service -> OCR Service read timeout (65 s).
    socket-timeout-millis: ${GATEWAY_SOCKET_TIMEOUT_MS:75000}
  routes:
    # Must precede the generic admissions route: these endpoints belong to Document Service.
    admission-documents:
      path: /api/admissions/*/documents/**
      url: ${DOCUMENT_SERVICE_URL:http://localhost:8082}
      strip-prefix: false
      sensitive-headers: Cookie,Set-Cookie
    patient-admissions:
      path: /api/admissions/**
      url: ${PATIENT_SERVICE_URL:http://localhost:8081}
      strip-prefix: false
      sensitive-headers: Cookie,Set-Cookie
    patients:
      path: /api/patients/**
      url: ${PATIENT_SERVICE_URL:http://localhost:8081}
      strip-prefix: false
      sensitive-headers: Cookie,Set-Cookie
    clinicians:
      path: /api/clinicians/**
      url: ${PATIENT_SERVICE_URL:http://localhost:8081}
      strip-prefix: false
      sensitive-headers: Cookie,Set-Cookie
    documents:
      path: /api/documents/**
      url: ${DOCUMENT_SERVICE_URL:http://localhost:8082}
      strip-prefix: false
      sensitive-headers: Cookie,Set-Cookie
