services:
  document-service:
    build:
      context: .
      dockerfile: docker/java/Dockerfile
    container_name: platform-document-service
    restart: unless-stopped
    env_file:
      - ${DOCUMENT_ENV_FILE:-.env}
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8082}:8082"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - platform-network

networks:
  platform-network:
    name: platform-network
    external: true
