services:
  patient-service:
    build:
      context: .
      dockerfile: docker/java/Dockerfile
    container_name: platform-patient-service
    restart: unless-stopped
    env_file:
      - ${PATIENT_ENV_FILE:-.env}
    ports:
      - "${PATIENT_SERVICE_PORT:-8081}:8081"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - platform-network

networks:
  platform-network:
    name: platform-network
    external: true
